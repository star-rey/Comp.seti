<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Калькулятор скидки</title>
</head>
<body>
<input type="number" id="price" placeholder="Стоимость товара">
<input type="number" id="age" placeholder="Возраст покупателя">
<button id="calcBtn">Рассчитать</button> 
<p id="result"></p>
<script>
let calcBtn = document.querySelector("#calcBtn");
let priceInput = document.querySelector("#price");
let ageInput = document.querySelector("#age");
let result = document.querySelector("#result");
function getDiscount(age){
    if(age < 18){
        return 10;
    } else if(age >= 60){
        return 20;
    }
    return 0;
}
calcBtn.onclick = function(){
    let price = Number(priceInput.value);
    let age = Number(ageInput.value);
    if(priceInput.value === "" || ageInput.value === ""){
        result.textContent = "Введите цену и возраст";
        result.style.color = "red";
        return;
    }
    let discount = getDiscount(age);
    let finalPrice = price - (price * discount / 100);
    result.textContent =
    "Итоговая цена: " + finalPrice + " рублей";
    result.style.color = "green";
};
</script>
</body>
</html>
