<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
<input type="text" id="cityInput" placeholder="Введите город">
<button id="findBtn">Найти</button>
<p id="result"></p>
<script>
let cities = ["Москва", "Санкт-Петербург", "Казань", "Новосибирск", "Екатеринбург"];
let cityInput = document.querySelector("#cityInput");
let findBtn = document.querySelector("#findBtn");
let result = document.querySelector("#result");
function findCity(cityName){
    let searchCity = cityName.toLowerCase();
    for(let i = 0; i < cities.length; i++){
        if(cities[i].toLowerCase() === searchCity){
            return true;
        }
    }
    return false;
}
findBtn.onclick = function(){
    let city = cityInput.value;
    if(city === ""){
        result.textContent ="Введите название города";
        result.style.color = "red";
        return;
    }
    if(findCity(city)){
        result.textContent ="Город найден";
        result.style.color = "green";
    }else{
        result.textContent ="Город не найден";
        result.style.color = "red";
    }
};
</script>
</body>
</html>
