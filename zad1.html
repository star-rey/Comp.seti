<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
<h2>Список книг</h2>
<ol id="bookList"></ol>
<p id="message"></p>
<script>
let books = ["Война и мир", "Преступление и наказание", "Мастер и Маргарита", "Гарри Поттер", "1984"];
let bookList = document.querySelector("#bookList");
let message = document.querySelector("#message");
if (books.length === 0) {
    message.textContent = "Список пуст";
} else {
    for (let i = 0; i < books.length; i++) {
        let li = document.createElement("li");
        li.textContent = books[i];
        bookList.appendChild(li);
    }
}
</script>
</body>
</html>
