<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
    <h2>Угадай число от 1 до 10</h2>
    <input type="number" id="userNumber" placeholder="Введите число">
    <button id="checkBtn">Проверить</button>
    <p id="result"></p>
    <script>
        let secretNumber =Math.floor(Math.random() * 10) + 1;
        let checkBtn =document.querySelector("#checkBtn");
        let userInput =document.querySelector("#userNumber");
        let result =document.querySelector("#result");
        checkBtn.onclick = function(){
            let userNumber = Number(userInput.value);
            if(userInput.value === ""){
                result.textContent ="Введите число";
                result.style.color = "red";
                return;
            }
            if(userNumber < secretNumber){
                result.textContent ="Больше";
                result.style.color = "blue";
            }else if(userNumber > secretNumber){
                result.textContent ="Меньше";
                result.style.color = "orange";
            }else{
                result.textContent ="Угадал!";
                result.style.color = "green";
            }
        };
    </script>
</body>
</html>
