<head>

    <title></title>
    <style>
        .block{
            width: 400px;
            background: lightblue;
            border: 1px solid #000;
            margin: 100px 150px 100px 80px;
        }

</head>
<body>
    <h1>Использвоание отступов</h1>
    <div class="block">
    Данный компонент имеет отступ сверху 100px,
    отступ справа 150px, отступ снизу 100px 
    и отступ слева 80px.
    </div>
</body>
</html>
