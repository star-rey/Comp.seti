<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        .box{
    background:green;
    color:black;
    padding:30px;
    margin:10px;
        }
        .o1{opacity:0.1;}
        .o3{opacity:0.3;}
        .o6{opacity:0.6;}
        .o10{opacity:1;}
    </style>
</head>
<body>
    
<h1>Полупрозрачные блоки</h1>

<div class="box o1">opacity 0.1</div>
<div class="box o3">opacity 0.3</div>
<div class="box o6">opacity 0.6</div>
<div class="box o10">opacity 1 (default)</div>
</body>
</html>
