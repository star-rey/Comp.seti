<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        .done{
            text-decoration: line-through;
            color: gray;
        }
    </style>

</head>
<body>
<input
type="text"
id="taskInput"
placeholder="Новое дело">

<button id="addTaskBtn">Добавить</button>
<button id="clearAllBtn">Очистить все</button>
<button id="deleteDoneBtn">Удалить выполненные</button>
<p id="counter">Всего дел: 0</p>
<ul id="taskList"></ul>
<p id="errorMsg"style="color:red;"></p>
<script>
let taskInput =document.querySelector("#taskInput");
let addTaskBtn =document.querySelector("#addTaskBtn");
let clearAllBtn =document.querySelector("#clearAllBtn");
let deleteDoneBtn =document.querySelector("#deleteDoneBtn");
let taskList =document.querySelector("#taskList");
let counter =document.querySelector("#counter");
let errorMsg =document.querySelector("#errorMsg");
function updateCounter(){
    let count =document.querySelectorAll("#taskList li").length;
    counter.textContent ="Всего дел: " + count;
}
function createTaskItem(taskText){
    let li =document.createElement("li");
    let span =document.createElement("span");
    span.textContent = taskText;
    span.onclick = function(){
        span.classList.toggle("done");
    };
    let deleteBtn =document.createElement("button");
    deleteBtn.textContent ="Удалить";
    deleteBtn.onclick =function(){
        li.remove();
        updateCounter();
    };
    li.appendChild(span);
    li.appendChild(deleteBtn);
    return li;
}

addTaskBtn.onclick =function(){
    let task =taskInput.value.trim();
    if(task === ""){
        errorMsg.textContent =
        "Введите текст дела";
        return;
    }
    errorMsg.textContent = "";
    let taskItem =createTaskItem(task);
    taskList.appendChild(taskItem);
    taskInput.value = "";
    updateCounter();
};
clearAllBtn.onclick =function(){
    taskList.innerHTML = "";
    updateCounter();
};
deleteDoneBtn.onclick =function(){
    let doneTasks = document.querySelectorAll(".done");
    for(let i = 0;
        i < doneTasks.length;
        i++){

        doneTasks[i]
        .parentElement
        .remove();
    }

    updateCounter();
};

</script>

</body>
</html>
