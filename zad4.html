<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Калькулятор чаевых</title>
</head>
<body>

<input type="number" id="bill" placeholder="Сумма счёта">
<br><br>

<input type="number" id="tips" placeholder="Процент чаевых">
<br><br>

<input type="number" id="people" placeholder="Количество человек" value="1">
<br><br>

<button id="calcBtn">Рассчитать</button>

<p id="tipResult"></p>
<p id="totalResult"></p>
<p id="personResult"></p>

<script>

let calcBtn = document.querySelector("#calcBtn");

let billInput = document.querySelector("#bill");
let tipsInput = document.querySelector("#tips");
let peopleInput = document.querySelector("#people");

let tipResult = document.querySelector("#tipResult");
let totalResult = document.querySelector("#totalResult");
let personResult = document.querySelector("#personResult");

function calculateTips(bill, percent){
    return bill * (percent / 100);
}

calcBtn.onclick = function(){

    let bill = Number(billInput.value);
    let percent = Number(tipsInput.value);
    let people = Number(peopleInput.value);

    if(
        billInput.value === "" ||
        tipsInput.value === "" ||
        peopleInput.value === ""
    ){
        tipResult.textContent =
        "Заполните все поля";

        return;
    }

    if(bill < 0){
        tipResult.textContent =
        "Сумма счёта не может быть меньше 0";
        return;
    }

    if(percent < 0 || percent > 50){
        tipResult.textContent =
        "Процент чаевых должен быть от 0 до 50";
        return;
    }

    if(people < 1){
        tipResult.textContent =
        "Количество человек должно быть не меньше 1";
        return;
    }

    let tips = calculateTips(bill, percent);

    let total = bill + tips;

    let perPerson = total / people;

    if(people > 1){
        perPerson = perPerson.toFixed(2);
    }

    tipResult.textContent =
    "Сумма чаевых: " + tips + " рублей";

    totalResult.textContent =
    "Общая сумма: " + total + " рублей";

    personResult.textContent =
    "Каждый должен заплатить по " +
    perPerson +
    " рублей (" +
    people +
    " человек)";
};
</script>
</body>
</html>
