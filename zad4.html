<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
            background-color: #f0f0f0;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        button {
            background-color: #6c5ce7;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
            box-shadow: 0 2px 10px rgba(108, 92, 231, 0.3);
        }
        button:hover {
            transform: scale(1.05);
            background-color: #5a4bd1;
        }
        button:active {
            transform: scale(0.95);
        }
        .color-info {
            margin-top: 20px;
            padding: 10px;
            background-color: rgba(0,0,0,0.05);
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
            color: #555;
        }
        .color-preview {
            width: 100%;
            height: 60px;
            margin-top: 15px;
            border-radius: 8px;
            border: 2px solid #ddd;
            background-color: #f0f0f0;
            transition: background-color 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Генератор цвета</h1>
        <p>Нажмите кнопку, чтобы изменить цвет фона</p>
        <button id="randomColorBtn">Случайный фон</button>
        <div class="color-info" id="colorInfo">Текущий цвет: rgb(240, 240, 240)</div>
        <div class="color-preview" id="colorPreview"></div>
    </div>
    <script>
        const button = document.getElementById('randomColorBtn');
        const colorInfo = document.getElementById('colorInfo');
        const colorPreview = document.getElementById('colorPreview');
        function generateRandomColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            const color = `rgb(${r}, ${g}, ${b})`;
            return color;
        }
        function applyRandomColor() {
            const newColor = generateRandomColor();
            document.body.style.backgroundColor = newColor;
            colorInfo.textContent = `Текущий цвет: ${newColor}`;
            colorPreview.style.backgroundColor = newColor;
        }
        button.onclick = applyRandomColor;
    </script>
</body>
</html>
