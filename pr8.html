<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
    .one{
border:20px outset blue;
margin:20px;
padding:10px;
}

.two{
    border-style:inset;
    border-width:20px;
    border-color:red blue;
    margin:20px;
    padding:10px;
}

.three{
    border-style:groove;
    border-width:20px;
    border-color:red green blue;
    margin:20px;
    padding:10px;
}

.four{
    border-style:ridge;
    border-width:20px;
    border-color:red green blue magenta;
    margin:20px;
    padding:10px;
}
    </style>
</head>
<body>
<div class="one">One-colored border!</div>
<div class="two">Two-colored border!</div>
<div class="three">Three-colored border!</div>
<div class="four">Four-colored border!</div>
</body>
</html>
