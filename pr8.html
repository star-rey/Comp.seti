<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lang</title>
    <style>
        p{
            font-size: 150%;
        }
        q:lang(de){
            quotes: "\201E" "\201C";
        }
        q:lang(en){
            quotes: "\201C" "201D";
        }
        q:lang(fr), q:lang(ru){
            quotes: "\00AB" "\00BB";
        }
    </style>
</head>
<body>
    <p>Цитата на французском языке: <q lang="fr">Ce que femme veut, Dieu le vent</q>.</p>
    <p>Цитата на немецком: <q lang="de">Der Mensch, versuche die Gotter nicht</q>.</p>
</body>
</html>
