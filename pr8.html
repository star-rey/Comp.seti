<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Селекторы в CSS3</title>
    <style>
        h2+div{
            color: red;
        }
    </style>
</head>
<body>
    <h2>Заголовок</h2>
    <div>
        <p>Текст первого блока</p>
    </div>
    <div>
        <p>Текст второго блока</p>
    </div>
</body>
</html>
