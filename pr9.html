<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Селекторы в CSS3</title>
    <style>
        :enabled{
            border: 2px black solid;
            color: red;
        }
    </style>
</head>
<body>
    <p><input type="text" value="enabled"/></p>
    <p><input type="text" disabled value="disabled"></p>
</body>
</html>
