<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Пример Б - Вывод списка</title>
    <style>
        .list-container {
            border: 1px solid #ccc;
            padding: 20px;
            margin: 20px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="list-container">
        <h2>🍎 Список продуктов</h2>
        <ul id="productList"></ul>
    </div>

    <script>
        let продукты = ["Молоко", "Хлеб", "Яйца", "Масло", "Сыр", "Колбаса"];
        let список = document.querySelector("#productList");
        
        for (let i = 0; i < продукты.length; i++) {
            список.innerHTML = список.innerHTML + "<li>" + продукты[i] + "</li>";
        }
        
        console.log("Всего продуктов: " + продукты.length);
    </script>
</body>
</html>
