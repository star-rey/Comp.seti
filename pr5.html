<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Селекторы в CSS3</title>
    <style>
        a:last-child{
            color: blue;
        }
    </style>
</head>
<body>
    <h3>Смартфоны</h3>
    <div>
        <a>Samsung Galaxy S7 </a><br/>
        <a>Apple iPad Pro</a><br/>
        <a>ASUS ZenPad Z380KL</a>
        <p>Данные за 2016</p>
    </div>
</body>
</html>
