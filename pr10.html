<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
    .box{
    background:#1ec7d7;
    border:2px solid #333;
    padding:20px;
    margin:15px;
}
.b1{border-radius:50px 0 0 50px;}
.b2{border-radius:40px 10px;}
.b3{border-radius:13em/3em;}
.b4{border-radius:13em 0.5em 1em 0.5em;}
.b5{border-radius:8px;}
    </style>
</head>
<body>
<div class="box b1">border-radius: 50px 0 0 50px;</div>
<div class="box b2">border-radius: 40px 10px;</div>
<div class="box b3">border-radius: 13em/3em;</div>
<div class="box b4">border-radius: 13em 0.5em 1em 0.5em;</div>
<div class="box b5">border-radius: 8px;</div>
</body>
</html>
