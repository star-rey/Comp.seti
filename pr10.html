<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Селекторы CSS3</title>
    <style>
        :checked+span{
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <p>
        <input type="checkbox" checked name="html15"/><span>HTML5</span>
    </p>
    <p>
        <input type="checkbox" name="dotnet"/><span>.NET</span>
    </p>
    <P><input type="checkbox" name="java"/><span>Java</span></P>
    <h2>Укажите пол</h2>
    <p>
        <input type="radio" value="man" checked name="gender"/><span>мужской</span>
    </p>
    <p>
        <input type="radio" value="woman" name="gender"/><span>женский</span>
    </p>
</body>
</html>
