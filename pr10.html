<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Селекторы атрибутов в CSS3</title>
    <style>
        .article > p{
            color: red;
        }
    </style>
</head>
<body>
    <div>
        <p>Аннотация к статье</p>
        <div class="content">
            <p>Текст статьи</p>
        </div>
    </div>
</body>
</html>
