<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
<button id="countBtn">Подсчитать</button>
<p id="more"></p>
<p id="less"></p>
<p id="equal"></p>
<p id="sum"></p>
<script>
let numbers =[5, 12, 8, 130, 44, 3, 7, 21];
let countBtn =document.querySelector("#countBtn");
let more =document.querySelector("#more");
let less =document.querySelector("#less");
let equal =document.querySelector("#equal");
let sumText =document.querySelector("#sum");
countBtn.onclick = function(){
    let moreCount = 0;
    let lessCount = 0;
    let equalCount = 0;
    let sum = 0;
    for(let i = 0; i < numbers.length; i++){
        if(numbers[i] > 10){
            moreCount++;
        }
        else if(numbers[i] < 10){
            lessCount++;
        }
        else{
            equalCount++;
        }
        sum += numbers[i];
    }
    more.textContent ="Чисел больше 10: " +moreCount;
    less.textContent ="Чисел меньше 10: " +lessCount;
    equal.textContent ="Чисел равных 10: " +equalCount;
    sumText.textContent ="Сумма элементов: " +sum;
};
</script>
</body>
</html>
