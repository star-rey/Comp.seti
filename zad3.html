<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
<input type="tel" id="phone" placeholder="Введите номер">
<button id="checkBtn">Проверить номер</button>
<p id="message"></p>
<script>
let checkBtn = document.querySelector("#checkBtn");
let phoneInput = document.querySelector("#phone");
let message = document.querySelector("#message");

function checkPhone(phoneNumber){

    if(phoneNumber === ""){
        return "Введите номер телефона";
    }

    let cleanedNumber = phoneNumber;

    if(cleanedNumber[0] === "+"){
        cleanedNumber = cleanedNumber.slice(1);
    }

    for(let i = 0; i < cleanedNumber.length; i++){
        if(cleanedNumber[i] < "0" || cleanedNumber[i] > "9"){
            return "Номер содержит недопустимые символы";
        }
    }

    if(phoneNumber.startsWith("+7") &&
       phoneNumber.length === 12){
        return "ok";
    }

    if(phoneNumber.startsWith("8") &&
       phoneNumber.length === 11){
        return "ok";
    }

    if(cleanedNumber.length === 10){
        return "ok";
    }

    return "Неверная длина номера";
}

checkBtn.onclick = function(){

    let phone = phoneInput.value;
    let result = checkPhone(phone);

    if(result === "ok"){
        message.textContent =
        "Номер телефона верный";
        message.style.color = "green";
    }else{
        message.textContent = result;
        message.style.color = "red";
    }
};
</script>
</body>
</html>
