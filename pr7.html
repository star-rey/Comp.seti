<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Соседние селекторы</title>
    <style>
        h1+h2{
            margin-top: -10px;
        }
        h2+p{
            margin-top: -1em;
        }
    </style>
</head>
<body>
    <h1>Заголовок 1</h1>
    <h2>Заголовок 2</h2>
    <p>Абзац!</p>
</body>
</html>
